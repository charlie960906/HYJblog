# 1. 幫這個工作流程取個漂漂亮亮的名字
name: Deploy to GitHub Pages

# 2. 設定觸發時機：當 main 分支被 push 時，立刻啟動！
on:
  push:
    branches:
      - main

# 3. 調整這台虛擬機在 GitHub 上的權限（因為它等一下要幫你發布網頁）
permissions:
  contents: read
  pages: write
  id-token: write

# 4. 開始定義任務內容
jobs:
  deploy:
    runs-on: ubuntu-latest # 借一台最新版的 Ubuntu Linux 虛擬機來用
    steps:
      # Step A: 呼叫現成外掛，把你的 GitHub 程式碼下載到這台虛擬機裡
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step B: 呼叫官方外掛，在虛擬機裡安裝 Node.js 環境
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm # 自動快取，下次打包速度會變超快

      # Step C: 執行終端機指令，安裝你專案需要的套件（如 lucide-react, marked）
      - name: Install dependencies
        run: npm ci

      # Step D: 執行編譯，產出純 HTML 的 out 資料夾
      - name: Build with Next.js
        run: npm run build

      # Step E: 呼叫 GitHub Pages 外掛，把 out 資料夾上傳打包
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      # Step F: 真正把網頁部署到你的網域 (hyjblog.hyjdevelop.com) 上
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4