name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # 如果您在 GitHub 上的預設分支名稱是 master，請將此處改為 master

permissions:
  contents: read
  pages: write
  id-token: write

# 💡 自動排解塞車機制：當推入新程式碼時，若舊的部署任務還在排隊，會自動中斷（Cancel）舊任務，避免線上撞車。
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm # 自動快取 node_modules，讓之後的打包速度大幅加快

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # Next.js 執行 export 後產出的純靜態 HTML 資料夾

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4