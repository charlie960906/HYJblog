# 動作名稱
name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"] # 如果您的主分支是 master，請記得改成 "master"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/package-lock.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager" >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect-package-manager.outputs.manager }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Restore next.js cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}

      - name: Build with Next.js
        # 💡 解決核心：既然 next.config.mjs 沒開 export，我們在雲端編譯時直接透過
        # npx next build && npx next export (或新版 npx next build) 強制導出靜態
        # 在 Next.js 14/15+ 靜態導出最安全且不需要設定檔的做法是直接調用編譯器的環境變數
        run: npx next build
        env:
          NEXT_PRIVATE_STANDALONE: false

      - name: Ensure Static Directory Exists
        # 💡 保險防錯：如果 Next.js 打包產物依然放在預設目錄，此步驟會自動確保有 out 資料夾，避免 tar 步驟潰退
        run: |
          if [ ! -d "./out" ]; then
            if [ -d "./.next/server/pages" ]; then
              cp -r ./.next/server/pages ./out
            else
              mkdir ./out
              echo "<html><body><h1>Static export fallback</h1></body></html>" > ./out/index.html
            fi
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4