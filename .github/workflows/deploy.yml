# 動作名稱
name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"] # 如果您的主分支是 master，請改成 "master"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/package-lock.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager" >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect-package-manager.outputs.manager }}

      - name: Setup Pages
        uses: actions/configure-pages@v4
        # 💡 這裡會自動幫 Next.js 在不改動 config 的情況下注入靜態導出環境變數

      - name: Restore next.js cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}

      - name: Build with Next.js
        # 💡 關鍵修正：透過環境變數直接強制 Next.js 在打包時輸出純靜態 HTML
        run: ${{ steps.detect-package-manager.outputs.manager }} run build
        env:
          NEXT_PRIVATE_STANDALONE: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 💡 因為沒開 output: export，Next.js 官方 Actions 外掛會將靜態產物編譯於 .next 或 out。
          # 配合 actions/configure-pages，最安全且通用的上傳路徑為 ./out 
          # 如果您的 Next.js 版本依然抓不到，請確保將此路徑改為 ./out 並搭配上方步驟
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4